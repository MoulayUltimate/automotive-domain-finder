<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Automotive Domain Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#f97316', dark: '#ea580c', light: '#fb923c' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    [x-cloak] { display: none !important; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body class="h-full bg-slate-950 text-slate-200 font-sans antialiased flex items-center justify-center px-4">

<div x-data="authApp()" x-init="init()" x-cloak class="w-full max-w-md fade-in">

  <!-- Logo / Brand -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-orange-500/10 border border-orange-500/20 mb-4">
      <svg class="w-7 h-7 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
      </svg>
    </div>
    <h1 class="text-2xl font-bold tracking-tight text-white">Automotive Domain Finder</h1>
    <p class="text-sm text-slate-500 mt-1">Expired domain hunter for the car niche</p>
  </div>

  <!-- Card -->
  <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden">

    <!-- Tabs -->
    <div class="flex border-b border-slate-800">
      <button
        @click="tab = 'signin'; error = ''; success = ''"
        :class="tab === 'signin' ? 'text-orange-500 border-b-2 border-orange-500 bg-slate-900' : 'text-slate-400 hover:text-slate-200'"
        class="flex-1 py-3.5 text-sm font-semibold transition-colors">
        Sign In
      </button>
      <button
        @click="tab = 'register'; error = ''; success = ''"
        :class="tab === 'register' ? 'text-orange-500 border-b-2 border-orange-500 bg-slate-900' : 'text-slate-400 hover:text-slate-200'"
        class="flex-1 py-3.5 text-sm font-semibold transition-colors">
        Create Account
      </button>
    </div>

    <!-- Form body -->
    <div class="p-6 space-y-4">

      <!-- Loading config -->
      <div x-show="loadingConfig" class="flex items-center justify-center py-8 gap-3 text-slate-400">
        <svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
        <span class="text-sm">Loading…</span>
      </div>

      <template x-if="!loadingConfig">
        <form @submit.prevent="handleSubmit" class="space-y-4">

          <!-- Full Name (register only) -->
          <div x-show="tab === 'register'" x-transition>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Full Name</label>
            <input
              type="text"
              x-model="fullName"
              placeholder="John Doe"
              class="w-full rounded-lg bg-slate-800 border border-slate-700 text-sm text-slate-200
                     placeholder-slate-600 px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-orange-500/50
                     focus:border-orange-500 transition-colors"
            />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Email</label>
            <input
              type="email"
              x-model="email"
              required
              placeholder="you@example.com"
              class="w-full rounded-lg bg-slate-800 border border-slate-700 text-sm text-slate-200
                     placeholder-slate-600 px-3.5 py-2.5 focus:outline-none focus:ring-2 focus:ring-orange-500/50
                     focus:border-orange-500 transition-colors"
            />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1.5">Password</label>
            <div class="relative">
              <input
                :type="showPassword ? 'text' : 'password'"
                x-model="password"
                required
                :placeholder="tab === 'register' ? 'At least 6 characters' : 'Your password'"
                class="w-full rounded-lg bg-slate-800 border border-slate-700 text-sm text-slate-200
                       placeholder-slate-600 px-3.5 py-2.5 pr-10 focus:outline-none focus:ring-2
                       focus:ring-orange-500/50 focus:border-orange-500 transition-colors"
              />
              <button type="button" @click="showPassword = !showPassword"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors">
                <svg x-show="!showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg x-show="showPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error message -->
          <div x-show="error" x-transition
            class="flex items-start gap-2 rounded-lg bg-red-500/10 border border-red-500/20 px-3.5 py-2.5 text-sm text-red-400">
            <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span x-text="error"></span>
          </div>

          <!-- Success message -->
          <div x-show="success" x-transition
            class="flex items-start gap-2 rounded-lg bg-green-500/10 border border-green-500/20 px-3.5 py-2.5 text-sm text-green-400">
            <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span x-text="success"></span>
          </div>

          <!-- Submit button -->
          <button
            type="submit"
            :disabled="loading"
            class="w-full rounded-lg bg-orange-500 hover:bg-orange-600 disabled:opacity-50 disabled:cursor-not-allowed
                   text-white text-sm font-semibold py-2.5 transition-colors flex items-center justify-center gap-2">
            <svg x-show="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
            </svg>
            <span x-text="tab === 'signin' ? (loading ? 'Signing in…' : 'Sign In') : (loading ? 'Creating account…' : 'Create Account')"></span>
          </button>

        </form>
      </template>
    </div>
  </div>

  <p class="text-center text-xs text-slate-600 mt-6">
    Automotive Domain Finder &copy; <span x-text="new Date().getFullYear()"></span>
  </p>
</div>

<script>
  function authApp() {
    return {
      tab: 'signin',
      email: '',
      password: '',
      fullName: '',
      showPassword: false,
      loading: false,
      loadingConfig: true,
      error: '',
      success: '',
      supabase: null,

      async init() {
        // Fetch config from backend
        try {
          const res = await fetch('/api/config');
          if (!res.ok) throw new Error('Config fetch failed');
          const cfg = await res.json();
          this.supabase = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);
        } catch (e) {
          this.error = 'Failed to load configuration. Please refresh.';
          this.loadingConfig = false;
          return;
        }

        this.loadingConfig = false;

        // If already authenticated → redirect
        try {
          const { data: { session } } = await this.supabase.auth.getSession();
          if (session) {
            window.location.href = '/';
            return;
          }
        } catch (_) {}
      },

      async handleSubmit() {
        this.error = '';
        this.success = '';
        this.loading = true;

        try {
          if (this.tab === 'signin') {
            await this.signIn();
          } else {
            await this.register();
          }
        } finally {
          this.loading = false;
        }
      },

      async signIn() {
        if (!this.email || !this.password) {
          this.error = 'Please fill in all fields.';
          return;
        }

        const { data, error } = await this.supabase.auth.signInWithPassword({
          email: this.email,
          password: this.password,
        });

        if (error) {
          this.error = this.friendlyError(error.message);
          return;
        }

        window.location.href = '/';
      },

      async register() {
        if (!this.email || !this.password) {
          this.error = 'Please fill in email and password.';
          return;
        }
        if (this.password.length < 6) {
          this.error = 'Password must be at least 6 characters.';
          return;
        }

        const { data, error } = await this.supabase.auth.signUp({
          email: this.email,
          password: this.password,
          options: {
            data: {
              full_name: this.fullName || '',
              role: 'member',
            }
          }
        });

        if (error) {
          this.error = this.friendlyError(error.message);
          return;
        }

        // Call post-register endpoint to auto-assign admin if first user
        if (data.session) {
          try {
            await fetch('/api/auth/post-register', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${data.session.access_token}`,
                'Content-Type': 'application/json',
              },
            });
          } catch (_) {}
          // If we got a session (email confirmation disabled), redirect
          window.location.href = '/';
        } else {
          // Email confirmation required
          this.success = 'Account created! Check your email to confirm your address, then sign in.';
          this.email = '';
          this.password = '';
          this.fullName = '';
          this.tab = 'signin';
        }
      },

      friendlyError(msg) {
        const m = (msg || '').toLowerCase();
        if (m.includes('invalid login') || m.includes('invalid credentials') || m.includes('wrong password')) {
          return 'Incorrect email or password. Please try again.';
        }
        if (m.includes('email not confirmed')) {
          return 'Please confirm your email address before signing in.';
        }
        if (m.includes('user already registered') || m.includes('already been registered')) {
          return 'An account with this email already exists. Try signing in.';
        }
        if (m.includes('rate limit')) {
          return 'Too many attempts. Please wait a moment and try again.';
        }
        if (m.includes('network') || m.includes('fetch')) {
          return 'Network error. Check your connection and try again.';
        }
        return msg || 'Something went wrong. Please try again.';
      },
    };
  }
</script>

</body>
</html>
