<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Automotive Domain Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#f97316', dark: '#ea580c', light: '#fb923c' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>[x-cloak] { display: none !important; }</style>
</head>

<body class="h-full bg-slate-950 text-slate-200 font-sans antialiased">

<div x-data="adminPage()" x-init="init()" x-cloak class="min-h-full flex flex-col">

  <!-- Header -->
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur px-6 py-3 flex items-center gap-3">
    <svg class="w-7 h-7 text-brand" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    <h1 class="text-lg font-bold tracking-tight">Admin Panel</h1>
    <span class="text-xs text-slate-500 hidden sm:inline">Team members</span>

    <div class="ml-auto flex items-center gap-3 text-xs">
      <a href="/" class="text-slate-400 hover:text-slate-200 transition-colors">← Back to App</a>
      <span class="text-slate-600">|</span>
      <span class="text-slate-400" x-text="me?.email || ''"></span>
      <button @click="signOut()" class="text-slate-500 hover:text-red-400 transition-colors" title="Sign Out">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="flex-1 px-6 py-8 max-w-6xl w-full mx-auto">

    <div class="flex items-end justify-between mb-6">
      <div>
        <h2 class="text-xl font-semibold">Registered Users</h2>
        <p class="text-sm text-slate-500 mt-1">
          <span x-text="users.length"></span> total ·
          <span x-text="users.filter(u => u.role === 'admin').length"></span> admin
        </p>
      </div>
      <button @click="load()" :disabled="loading"
              class="text-xs text-slate-400 hover:text-slate-200 px-3 py-1.5 rounded-md border border-slate-700 hover:border-slate-600 transition-colors">
        ↻ Refresh
      </button>
    </div>

    <div x-show="error" class="rounded-lg bg-red-500/10 border border-red-500/30 px-4 py-3 text-sm text-red-300 mb-4" x-text="error"></div>

    <!-- Loading -->
    <div x-show="loading && !users.length" class="text-slate-500 text-sm text-center py-10">Loading users…</div>

    <!-- Table -->
    <div x-show="users.length" class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-800/40 text-xs uppercase tracking-wider text-slate-500">
          <tr>
            <th class="text-left px-4 py-3 font-medium">User</th>
            <th class="text-left px-4 py-3 font-medium">Role</th>
            <th class="text-left px-4 py-3 font-medium">Joined</th>
            <th class="text-left px-4 py-3 font-medium">Last Login</th>
            <th class="text-right px-4 py-3 font-medium">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-slate-800">
          <template x-for="u in users" :key="u.email">
            <tr class="hover:bg-slate-800/30 transition-colors">
              <!-- Name + email -->
              <td class="px-4 py-3">
                <div class="flex items-center gap-3">
                  <div class="w-8 h-8 rounded-full bg-orange-500/20 border border-orange-500/30 flex items-center justify-center text-xs font-bold text-orange-400 shrink-0"
                       x-text="(u.full_name || u.email)[0].toUpperCase()"></div>
                  <div>
                    <div class="font-medium text-slate-200 flex items-center gap-2">
                      <span x-text="u.full_name || '—'"></span>
                      <span x-show="u.email === me?.email"
                            class="text-[9px] uppercase tracking-wider bg-slate-700 text-slate-300 rounded px-1.5 py-0.5">
                        you
                      </span>
                    </div>
                    <div class="text-xs text-slate-500" x-text="u.email"></div>
                  </div>
                </div>
              </td>
              <!-- Role badge -->
              <td class="px-4 py-3">
                <span :class="u.role === 'admin'
                  ? 'bg-orange-500/10 text-orange-400 border-orange-500/20'
                  : 'bg-slate-700/40 text-slate-400 border-slate-600/30'"
                  class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium border"
                  x-text="u.role"></span>
              </td>
              <!-- Joined -->
              <td class="px-4 py-3 text-xs text-slate-400" x-text="formatDate(u.created_at)"></td>
              <!-- Last login -->
              <td class="px-4 py-3 text-xs text-slate-400" x-text="formatDate(u.last_login) || '—'"></td>
              <!-- Actions -->
              <td class="px-4 py-3 text-right">
                <div class="inline-flex items-center gap-2">
                  <!-- Toggle admin -->
                  <button @click="toggleRole(u)"
                          :disabled="u.email === me?.email || busy[u.email]"
                          :class="u.role === 'admin' ? 'border-slate-700 hover:border-slate-500 text-slate-400'
                                                     : 'border-orange-500/30 hover:border-orange-500/60 text-orange-400'"
                          class="text-xs px-2.5 py-1 rounded-md border transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                          x-text="u.role === 'admin' ? 'Remove Admin' : 'Make Admin'"></button>
                  <!-- Delete -->
                  <button @click="deleteUser(u)"
                          :disabled="u.email === me?.email || busy[u.email]"
                          class="text-xs px-2.5 py-1 rounded-md border border-red-500/30 hover:border-red-500/60 text-red-400 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    Delete
                  </button>
                </div>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script>
function adminPage() {
  return {
    me:      null,
    users:   [],
    loading: false,
    error:   '',
    busy:    {},

    init() {
      const stored = localStorage.getItem('adf_auth');
      if (!stored) { window.location.href = '/login.html'; return; }
      try { this.me = JSON.parse(stored).user; } catch (_) {}
      this.load();
    },

    token() {
      try { return JSON.parse(localStorage.getItem('adf_auth') || '{}').token; }
      catch (_) { return ''; }
    },

    async _fetch(url, opts = {}) {
      const headers = Object.assign(
        { 'Content-Type': 'application/json', 'Authorization': `Bearer ${this.token()}` },
        opts.headers || {},
      );
      const res = await fetch(url, { ...opts, headers });
      if (res.status === 401) {
        localStorage.removeItem('adf_auth');
        window.location.href = '/login.html';
        return null;
      }
      if (res.status === 403) {
        this.error = 'You do not have admin access.';
        setTimeout(() => window.location.href = '/', 2000);
        return null;
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
      return data;
    },

    async load() {
      this.loading = true; this.error = '';
      try {
        const data = await this._fetch('/api/admin/users');
        if (data) this.users = data.users;
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },

    async toggleRole(u) {
      const newRole = u.role === 'admin' ? 'member' : 'admin';
      this.busy[u.email] = true;
      try {
        await this._fetch(`/api/admin/users/${encodeURIComponent(u.email)}/role`, {
          method: 'POST',
          body:   JSON.stringify({ role: newRole }),
        });
        u.role = newRole;
      } catch (e) {
        this.error = e.message;
      } finally {
        this.busy[u.email] = false;
      }
    },

    async deleteUser(u) {
      if (!confirm(`Permanently delete ${u.email}? This cannot be undone.`)) return;
      this.busy[u.email] = true;
      try {
        await this._fetch(`/api/admin/users/${encodeURIComponent(u.email)}`, { method: 'DELETE' });
        this.users = this.users.filter(x => x.email !== u.email);
      } catch (e) {
        this.error = e.message;
      } finally {
        this.busy[u.email] = false;
      }
    },

    signOut() {
      localStorage.removeItem('adf_auth');
      window.location.href = '/login.html';
    },

    formatDate(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      } catch (_) { return iso.slice(0, 10); }
    },
  };
}
</script>

</body>
</html>
